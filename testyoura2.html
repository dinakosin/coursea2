<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Test your English — A2</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(160deg,#fdf6ec,#fef9f3);
    color:#3a342e; min-height:100vh; margin:0; padding:24px;
    display:flex; flex-direction:column; align-items:center;
  }
  .wrap{ width:100%; max-width:560px; }
  h1{
    font-size:1.9rem; text-align:center; margin:0 0 4px;
    background:linear-gradient(90deg,#f6a623,#e8743b);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .intro{ text-align:center; color:#a89b88; font-size:.85rem; margin-bottom:18px; }
  .progress-outer{
    width:100%; height:12px; background:rgba(232,116,59,.15);
    border-radius:20px; overflow:hidden; margin-bottom:8px;
  }
  .progress-inner{
    height:100%; width:20%;
    background:linear-gradient(90deg,#f6a623,#e8743b);
    border-radius:20px; transition:width .4s ease;
  }
  .pagenum{ text-align:center; font-size:.8rem; color:#b0795a; font-weight:600; margin-bottom:20px; }

  .page{ display:none; }
  .page.active{ display:block; }

  .q{
    background:#fff; border:2px solid #f6e3cd; border-radius:16px;
    padding:16px; margin-bottom:16px;
    box-shadow:0 6px 16px rgba(232,116,59,.1);
  }
  .q .qtext{ font-weight:700; margin-bottom:12px; font-size:1.02rem; }
  .q .qtext span.star{ color:#e8743b; }
  label.opt{
    display:block; background:#fdf9f4; border:2px solid #f6e3cd;
    border-radius:12px; padding:11px 14px; margin-bottom:8px;
    cursor:pointer; font-size:.95rem; transition:.15s;
  }
  label.opt:hover{ border-color:#f6a623; }
  label.opt input{ display:none; }
  label.opt.checked{
    background:#fdeede; border-color:#e8743b; font-weight:600;
  }
  .unanswered{ border-color:#e85b5b !important; animation:shake .3s; }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }

  .controls{ display:flex; gap:10px; margin-top:10px; }
  button{
    flex:1; border:none; border-radius:14px; padding:14px 8px;
    font-size:1rem; font-weight:700; cursor:pointer; color:#fff;
    background:linear-gradient(90deg,#f6a623,#e8743b);
    transition:transform .1s;
  }
  button.sec{ background:rgba(232,116,59,.35); }
  button:active{ transform:scale(.97); }

  .warn{ color:#e85b5b; font-size:.82rem; text-align:center; margin-top:8px; min-height:18px; }

  /* RESULT */
  #result{ display:none; text-align:center; padding:20px 6px; }
  #result .big{ font-size:3.4rem; }
  #result h2{ font-size:1.5rem; margin:14px 0 6px; }
  .scorebox{
    background:#fff; border:2px solid #f6e3cd; border-radius:18px;
    padding:24px; margin:18px 0; box-shadow:0 6px 16px rgba(232,116,59,.12);
  }
  .scorenum{
    font-size:3rem; font-weight:800;
    background:linear-gradient(90deg,#f6a623,#e8743b);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .scoreout{ font-size:1rem; color:#a89b88; }
  .levelmsg{ font-size:1.05rem; line-height:1.5; margin-top:14px; }
  .levelmsg b{ color:#e8743b; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Test your English</h1>
  <p class="intro" id="introText">For the questions below, please choose the best option to complete the sentence or conversation.</p>

  <div id="quiz">
    <div class="progress-outer"><div class="progress-inner" id="bar"></div></div>
    <div class="pagenum" id="pagenum">Page 1 / 5</div>

    <form id="quizForm"></form>

    <div class="controls">
      <button type="button" class="sec" id="prevBtn" onclick="prevPage()" style="display:none;">← Back</button>
      <button type="button" id="nextBtn" onclick="nextPage()">Next →</button>
    </div>
    <div class="warn" id="warn"></div>
  </div>

  <div id="result">
    <div class="big">🎉</div>
    <h2>Well done for completing the test!</h2>
    <div class="scorebox">
      <div class="scorenum"><span id="score">0</span></div>
      <div class="scoreout">out of 25</div>
    </div>
    <div class="levelmsg" id="levelmsg"></div>
    <div class="controls" style="margin-top:20px;">
      <button type="button" onclick="restart()">🔁 Try again</button>
    </div>
  </div>
</div>

<script>
/* ===== DATA ===== */
const questions = [
  // PAGE 1
  {p:1, q:"Could you tell me your surname?", opts:["Would you like me to spell it?","Do you like my family name?","How do I say that?"], correct:0},
  {p:1, q:"This plant looks dead.", opts:["It's in the garden.","It only needs some water.","It's sleeping."], correct:1},
  {p:1, q:"I hope it doesn't rain.", opts:["Of course not.","Will it be wet?","So do I."], correct:2},
  {p:1, q:"Are you going to come inside soon?", opts:["For ever.","Not long.","In a minute."], correct:2},
  {p:1, q:"Who gave you this book, Lucy?", opts:["I bought it.","For my birthday.","My uncle was."], correct:0},

  // PAGE 2
  {p:2, q:"Shall we go out for pizza tonight?", opts:["I know that.","It's very good.","I'm too tired."], correct:2},
  {p:2, q:"Do you mind if I come too?", opts:["That's fine!","I'd like to.","I don't know if I can."], correct:0},
  {p:2, q:"There's someone at the door.", opts:["Can I help you?","Well, go and answer it then.","He's busy at the moment."], correct:1},
  {p:2, q:"How much butter do I need for this cake?", opts:["I'd like one.","I'll use some.","I'm not sure."], correct:2},
  {p:2, q:"How long are you here for?", opts:["Since last week.","Ten days ago.","Till tomorrow."], correct:2},

  // PAGE 3
  {p:3, q:"Have you guys had enough to eat?", opts:["That's all right.","Is there any more rice?","It's not the right time."], correct:1},
  {p:3, q:"That's my coat over there.", opts:["Will you take it off?","No, you haven't!","Here you are."], correct:2},
  {p:3, q:"Let's go by bus.", opts:["The train was expensive.","We'll buy a ticket.","It'll take too long."], correct:2},
  {p:3, q:"Do you know my brother Charlie?", opts:["Sorry, he's not here.","I don't think I do.","I know."], correct:1},
  {p:3, q:"Would you like some ice in your drink or not?", opts:["I hope so.","Yes, I shall.","I don't mind."], correct:2},

  // PAGE 4
  {p:4, q:"I hope I haven't ...... you any trouble by changing the arrangements.", opts:["put","caused","made","done"], correct:1},
  {p:4, q:"The floor is wet: don't run or you might ...... !", opts:["stoop","spill","slip","spin"], correct:2},
  {p:4, q:"When you come to my house, ...... your camera with you.", opts:["take","show","fetch","bring"], correct:3},
  {p:4, q:"Paul arrived at the shop ...... as the manager was closing for the day.", opts:["even","just","still","right"], correct:1},
  {p:4, q:"I would ...... to stay at home and relax for a change.", opts:["rather","better","prefer","enjoy"], correct:0},

  // PAGE 5
  {p:5, q:"Is there ...... of food for everyone?", opts:["adequate","enough","sufficient","plenty"], correct:3},
  {p:5, q:"Lily says she's happy at school but she's ...... complaining.", opts:["rarely","sometimes","always","often"], correct:2},
  {p:5, q:"...... the step when you go in.", opts:["Consider","Mind","Attend","Look"], correct:1},
  {p:5, q:"...... stay the night if it's too difficult to get home.", opts:["At all costs","By all means","In all","On the whole"], correct:1},
  {p:5, q:"No ...... Hannah is happy when you think how many prizes she has won recently.", opts:["surprise","problem","question","wonder"], correct:3},
];

const TOTAL_PAGES = 5;
let currentPage = 1;
const answers = {}; // {questionIndex: optionIndex}

const form = document.getElementById('quizForm');

function renderPage(){
  form.innerHTML = '';
  questions.forEach((item, idx)=>{
    if(item.p !== currentPage) return;
    const qDiv = document.createElement('div');
    qDiv.className = 'q';
    qDiv.dataset.qidx = idx;
    let optsHTML = '';
    item.opts.forEach((opt, oi)=>{
      const checked = answers[idx] === oi ? 'checked' : '';
      optsHTML += `
        <label class="opt ${checked}" data-q="${idx}" data-o="${oi}">
          <input type="radio" name="q${idx}" value="${oi}">
          ${opt}
        </label>`;
    });
    qDiv.innerHTML = `<div class="qtext">${item.q} <span class="star">*</span></div>${optsHTML}`;
    form.appendChild(qDiv);
  });

  // listeners
  form.querySelectorAll('label.opt').forEach(lbl=>{
    lbl.addEventListener('click', ()=>{
      const q = +lbl.dataset.q;
      const o = +lbl.dataset.o;
      answers[q] = o;
      // update visual
      form.querySelectorAll(`label.opt[data-q="${q}"]`).forEach(l=>l.classList.remove('checked'));
      lbl.classList.add('checked');
      // remove warning highlight
      lbl.closest('.q').querySelectorAll('label.opt').forEach(l=>l.classList.remove('unanswered'));
    });
  });

  updateUI();
}

function updateUI(){
  document.getElementById('bar').style.width = (currentPage/TOTAL_PAGES*100) + '%';
  document.getElementById('pagenum').textContent = `Page ${currentPage} / ${TOTAL_PAGES}`;
  document.getElementById('prevBtn').style.display = currentPage>1 ? 'block' : 'none';
  document.getElementById('nextBtn').textContent = currentPage===TOTAL_PAGES ? 'Submit answers ✓' : 'Next →';
  document.getElementById('warn').textContent = '';
  window.scrollTo({top:0, behavior:'smooth'});
}

function pageAnswered(){
  const onPage = questions.map((q,i)=>({...q,i})).filter(q=>q.p===currentPage);
  const missing = onPage.filter(q=>answers[q.i] === undefined);
  if(missing.length){
    missing.forEach(q=>{
      const qDiv = form.querySelector(`.q[data-qidx="${q.i}"]`);
      if(qDiv) qDiv.querySelectorAll('label.opt').forEach(l=>l.classList.add('unanswered'));
    });
    document.getElementById('warn').textContent = 'Please answer all questions before continuing.';
    return false;
  }
  return true;
}

function nextPage(){
  if(!pageAnswered()) return;
  if(currentPage < TOTAL_PAGES){
    currentPage++;
    renderPage();
  } else {
    submitTest();
  }
}

function prevPage(){
  if(currentPage > 1){
    currentPage--;
    renderPage();
  }
}

function submitTest(){
  let score = 0;
  questions.forEach((q,i)=>{
    if(answers[i] === q.correct) score++;
  });

  document.getElementById('quiz').style.display = 'none';
  document.getElementById('introText').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('score').textContent = score;

  document.getElementById('levelmsg').innerHTML = getLevelMessage(score);
  window.scrollTo({top:0, behavior:'smooth'});
}

function getLevelMessage(score){
  if(score >= 23){
    return `Your score means you might be ready to prepare for <b>B1 Preliminary (PET)</b> or <b>B1 level</b> exams.`;
  } else if(score >= 18){
    return `Your score means you might be ready to prepare for <b>A2 Key (KET)</b> or <b>B1 level</b> courses.`;
  } else if(score >= 12){
    return `Your score means you might be ready to prepare for <b>A2 Key (KET)</b> or <b>A2 level</b> courses.`;
  } else if(score >= 7){
    return `Your score means you might be ready to prepare for <b>A1 Movers</b> or <b>A2 level</b> courses.`;
  } else {
    return `Your score means you might be ready to prepare for <b>A1 level</b> or <b>A1 Movers</b> courses.`;
  }
}

function restart(){
  for(const k in answers) delete answers[k];
  currentPage = 1;
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('introText').style.display = 'block';
  renderPage();
}

renderPage();
</script>
</body>
</html>
